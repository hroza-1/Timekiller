<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKiller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .score {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .coin-btn {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #ffbc00, #cc9600);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 188, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 90px;
            cursor: pointer;
            transition: transform 0.05s ease;
        }
        .coin-btn:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="score">💰 <span id="balance">0</span></div>
    <div class="coin-btn" id="coin">🪙</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем ID пользователя из Telegram
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id : 12345; // 12345 — заглушка для тестов в браузере

        // Сюда нужно будет прописать адрес твоего Flask-сервера
        // Если тестируешь через локальную сеть, укажи IP компа/телефона
        const SERVER_URL = "https://timekiller.onrender.com"; 

        let balance = 0;
        let unsavedClicks = 0;
        const balanceTxt = document.getElementById('balance');
        const coinBtn = document.getElementById('coin');

        // Запрашиваем баланс из базы данных при старте
        async function loadProfile() {
            try {
                let response = await fetch(`${SERVER_URL}/api/get_profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                let data = await response.json();
                if (data.balance !== undefined) {
                    balance = data.balance;
                    balanceTxt.innerText = balance;
                }
            } catch (err) {
                console.log("Ошибка загрузки профиля:", err);
            }
        }

        // Отправка кликов на сервер пачкой (каждые 3 секунды), чтобы не спамить запросами
        async function sendClicksToServer() {
            if (unsavedClicks === 0) return;

            let clicksToSend = unsavedClicks;
            unsavedClicks = 0; // Сбрасываем локальный счетчик перед отправкой

            try {
                let response = await fetch(`${SERVER_URL}/api/tap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, clicks: clicksToSend })
                });
                let data = await response.json();
                if (data.status === "success") {
                    balance = data.new_balance;
                    balanceTxt.innerText = balance;
                }
            } catch (err) {
                console.log("Ошибка отправки кликов:", err);
                unsavedClicks += clicksToSend; // Если сеть упала, возвращаем клики обратно
            }
        }

        function doTap(e) {
            e.preventDefault();
            balance++;
            unsavedClicks++;
            balanceTxt.innerText = balance;
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        coinBtn.addEventListener('touchstart', doTap);
        coinBtn.addEventListener('click', (e) => {
            if (e.pointerType !== 'touch') {
                balance++;
                unsavedClicks++;
                balanceTxt.innerText = balance;
            }
        });

        // Запускаем загрузку профиля
        loadProfile();

        // Отправляем клики на сервер каждые 3 секунды
        setInterval(sendClicksToServer, 3000);
    </script>
</body>
</html>
