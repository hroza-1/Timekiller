<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeKiller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212; /* Черный фон вместо белого */
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .score {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .coin-btn {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #ffbc00, #cc9600);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 188, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 90px;
            cursor: pointer;
            transition: transform 0.05s ease;
        }
        .coin-btn:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="score">💰 <span id="balance">0</span></div>
    <div class="coin-btn" id="coin">🪙</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 0;
        const balanceTxt = document.getElementById('balance');
        const coinBtn = document.getElementById('coin');

        function doTap(e) {
            e.preventDefault();
            balance++;
            balanceTxt.innerText = balance;
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        coinBtn.addEventListener('touchstart', doTap);
        coinBtn.addEventListener('click', (e) => {
            if (e.pointerType !== 'touch') {
                balance++;
                balanceTxt.innerText = balance;
            }
        });
    </script>
</body>
</html>
